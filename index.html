<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VAILISM — Stream movies and TV shows instantly. A premium Netflix-style streaming experience.">
    <title>VAILISM — Stream Everything</title>
    <link rel="stylesheet" href="style.css">
    <!-- Advanced Loading Preconnections -->
    <link rel="preconnect" href="https://image.tmdb.org" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="nav-left">
            <h1 class="logo" onclick="window.location.reload()">VAILISM</h1>
        </div>
        <div class="nav-right">
            <div class="search-container">
                <span class="search-icon"><i data-lucide="search"></i></span>
                <input type="text" id="search-input" placeholder="Titles, genres..." autocomplete="off">
            </div>
        </div>
    </nav>

    <!-- Search Overlay -->
    <div id="search-view" class="search-view hidden">
        <div class="search-wrapper">
            <h2>Search Results</h2>
            <div id="search-results" class="search-grid"></div>
        </div>
    </div>

    <!-- Main App Container (Hidden during search) -->
    <div id="app-content">
        <!-- Hero Section -->
        <header class="hero" id="hero">
            <div class="hero-vignette"></div>
            <div class="hero-content">
                <h1 class="hero-title skeleton-text" id="hero-title"></h1>
                <div class="hero-meta" id="hero-meta" style="opacity: 0;">
                    <span id="hero-rating" class="meta-rating"></span>
                    <span id="hero-year" class="meta-year"></span>
                    <span id="hero-runtime" class="meta-runtime"></span>
                </div>
                <div class="hero-genres" id="hero-genres"></div>
                <p class="hero-description skeleton-text" id="hero-desc"></p>
                <div class="hero-buttons">
                    <button class="btn btn-play" id="hero-play" style="display: none;">
                        <i data-lucide="play" fill="currentColor"></i> Play
                    </button>
                    <button class="btn btn-info" id="hero-info" style="display: none;">
                        <i data-lucide="info"></i> More Info
                    </button>
                </div>
            </div>
        </header>

        <!-- Rows Container -->
        <main class="main-content" id="main-content">
            <!-- Dynamically injected rows -->
        </main>
    </div>

    <script src="script.js"></script>
    <script>
      if (window.lucide) lucide.createIcons();
    </script>
</body>
</html>
